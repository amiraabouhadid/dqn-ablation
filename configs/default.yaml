# Shared hyperparameters (Mnih et al., 2015)
gamma: 0.99
lr: 0.0001
batch_size: 32
buffer_size: 100000
learning_starts: 10000
train_freq: 4
target_update_freq: 1000
eps_start: 1.0
eps_end: 0.1
eps_decay_steps: 500000

# PER-specific (only used by per_dqn)
per_alpha: 0.6
per_beta_start: 0.4
per_beta_frames: 1000000

# Training
total_steps: 1000000
log_interval: 10
seed: 42
